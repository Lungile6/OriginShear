specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: HarvestLedger
    network: celo-sepolia
    source:
      address: "0x617451963A2ae2B143311094fF5F921a4B169B43"
      abi: HarvestLedger
      startBlock: 29778550
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Farmer
        - Lot
        - Validation
      abis:
        - name: HarvestLedger
          file: HarvestLedger/abis/HarvestLedger.json
      eventHandlers:
        - event: FarmerRegistered(indexed address,string,string)
          handler: handleFarmerRegistered
        - event: LotRegistered(indexed uint256,indexed address,bytes32,uint8,uint8,uint32)
          handler: handleLotRegistered
        - event: LotValidated(indexed uint256,indexed address,uint8)
          handler: handleLotValidated
      file: HarvestLedger/HarvestLedger.wasm
  - kind: ethereum
    name: FarmerMarket
    network: celo-sepolia
    source:
      address: "0x3675Db5F51917D55A3D9E96AdD137b314633b003"
      abi: FarmerMarket
      startBlock: 29778556
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Offer
        - Purchase
        - Payment
      abis:
        - name: FarmerMarket
          file: FarmerMarket/abis/FarmerMarket.json
      eventHandlers:
        - event: LotListed(indexed uint256,indexed uint256,address,uint256)
          handler: handleLotListed
        - event: PurchaseEscrowed(indexed uint256,address,uint256)
          handler: handlePurchaseEscrowed
        - event: PaymentReleased(indexed uint256,address,uint256,uint256)
          handler: handlePaymentReleased
        - event: OfferCancelled(indexed uint256)
          handler: handleOfferCancelled
      file: HarvestLedger/HarvestLedger.wasm
  - kind: ethereum
    name: IndustryMarkRegistry
    network: celo-sepolia
    source:
      address: "0x084E3c8427203C698f26d4eF34348a4B19041734"
      abi: IndustryMarkRegistry
      startBlock: 29778567
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Mark
      abis:
        - name: IndustryMarkRegistry
          file: IndustryMarkRegistry/abis/IndustryMarkRegistry.json
      eventHandlers:
        - event: MarkIssued(indexed uint256,indexed address,string,uint8,uint256)
          handler: handleMarkIssued
        - event: MarkRevoked(indexed uint256,indexed address)
          handler: handleMarkRevoked
        - event: MarkExpired(indexed uint256)
          handler: handleMarkExpired
      file: HarvestLedger/HarvestLedger.wasm
